<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      RetroTech | Low-Tech Community Hub {% block title %}{% endblock %}
    </title>
    <!-- Retro Typefaces -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="retro-mode">
    <!-- Retro Border -->
    <div class="retro-border"></div>

    <!-- Text-based Navbar -->
    <nav class="navbar retro-nav">
      <div class="nav-container">
        <a href="/" class="brand">[ RETRO<span>TECH </span>]</a>
        <ul class="nav-links">
          <li>
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}"
              >Home</a
            >
          </li>
          <li>
            <a
              href="/features"
              class="{{ 'active' if request.path == '/features' else '' }}"
              >Features</a
            >
          </li>
          <li>
            <a
              href="/about"
              class="{{ 'active' if request.path == '/about' else '' }}"
              >About</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Content Injection -->
    <main class="content-wrapper">{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 RetroTech Community. Built by Indies, For Indies.</p>
      <p class="ascii-art">~*~ Low-Tech, No Corporate Bloat ~*~</p>
    </footer>

    <!-- Custom Micro-animations JS -->
    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
